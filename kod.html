<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>Model Viewer</title>

  <script type="module" src="https://cdn.jsdelivr.net/npm/@google/model-viewer/dist/model-viewer.min.js"></script>

  <style>
    body {
      margin: 0;
      background: #f5f5f7;
      overflow: hidden;
    }

    model-viewer {
      width: 100vw;
      height: 100vh;
    }

    #controls {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: white;
      padding: 10px;
      border-radius: 30px;
      display: flex;
      gap: 10px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
      z-index: 100;
    }

    button {
      padding: 10px 15px;
      border-radius: 20px;
      border: none;
      cursor: pointer;
    }

    button.active {
      background: orange;
      color: white;
    }

    #debug {
      position: fixed;
      top: 20px;
      left: 20px;
      background: rgba(0,0,0,0.8);
      color: white;
      padding: 10px;
      border-radius: 5px;
      font-family: monospace;
      z-index: 1000;
      max-width: 300px;
    }

    /* progress bar */
    .progress-bar {
      display: block;
      width: 100%;
      height: 4px;
      background: rgba(255,255,255,0.2);
    }

    .update-bar {
      width: 0%;
      height: 100%;
      background: orange;
    }

    .hide {
      display: none;
    }

    /* AR prompt */
    #ar-prompt {
      position: absolute;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
      display: none;
    }

    model-viewer[ar-status="session-started"] #ar-prompt {
      display: block;
    }
  </style>
</head>

<body>

<div id="debug">
  <div>Статус: <span id="status">Загрузка...</span></div>
  <div>Модель: <span id="modelPath">kgirls01.glb</span></div>
  <div id="error"></div>
</div>

<div id="controls">
  <button id="btn1">🎬 Анимация 1</button>
  <button id="btn2">🚶 Анимация 2</button>
  <button id="outlineBtn">✨ Контур</button>
  <button id="pixelBtn">🔳 Пиксели</button>
</div>

<model-viewer
  id="mv"
  src="kgirls01.glb"
  camera-controls
  autoplay
  shadow-intensity="1"
  ar
  ar-modes="webxr scene-viewer quick-look"
  tone-mapping="neutral"
>

  <!-- ✅ Progress bar -->
  <div class="progress-bar" slot="progress-bar">
    <div class="update-bar" id="progressBar"></div>
  </div>

  <!-- ✅ AR кнопка -->
  <button slot="ar-button" id="ar-button">
    AR режим
  </button>

  <!-- ✅ AR prompt -->
  <div id="ar-prompt">
    <img src="https://modelviewer.dev/shared-assets/icons/hand.png">
  </div>

  <!-- ✅ Эффекты -->
  <effect-composer>
    <outline-effect id="outlineEffect" color="red" blend-mode="skip"></outline-effect>
    <pixelate-effect id="pixelEffect" granularity="15" blend-mode="skip"></pixelate-effect>
  </effect-composer>

</model-viewer>

<script type="module">
import 'https://cdn.jsdelivr.net/npm/@google/model-viewer-effects/dist/model-viewer-effects.min.js';

(() => {

  const mv = document.getElementById('mv');
  const btn1 = document.getElementById('btn1');
  const btn2 = document.getElementById('btn2');
  const outlineBtn = document.getElementById('outlineBtn');
  const pixelBtn = document.getElementById('pixelBtn');
  const statusSpan = document.getElementById('status');
  const errorDiv = document.getElementById('error');
  const progressBar = document.getElementById('progressBar');

  const outlineEffect = document.getElementById('outlineEffect');
  const pixelEffect = document.getElementById('pixelEffect');

  let animations = [];
  let outlineOn = false;
  let pixelOn = false;

  // Проверка эффектов
  if (!outlineEffect || !pixelEffect) {
    console.warn('Эффекты не найдены');
  }

  // Загрузка
  mv.addEventListener('load', () => {
    statusSpan.textContent = '✅ Загружено';
    statusSpan.style.color = 'lightgreen';

    animations = mv.availableAnimations || [];
    console.log('Анимации:', animations);

    if (animations.length > 0) {
      playAnimation(0);
    }
  });

  // Прогресс
  mv.addEventListener('progress', (event) => {
    const progress = Math.round(event.detail.totalProgress * 100);
    statusSpan.textContent = `Загрузка... ${progress}%`;
    progressBar.style.width = progress + '%';
  });

  // Ошибка
  mv.addEventListener('error', (event) => {
    const error = event.detail;

    statusSpan.textContent = '❌ Ошибка';
    statusSpan.style.color = 'red';

    let errorMsg = 'Неизвестная ошибка';
    if (error && error.type) {
      errorMsg = `${error.type}: ${error.message || ''}`;
    }

    errorDiv.innerHTML = `Ошибка: ${errorMsg}`;
    console.error(error);
  });

  // Проверка файла
  fetch('kgirls01.glb', { method: 'HEAD' })
    .then(res => {
      if (!res.ok) {
        errorDiv.innerHTML = `Файл не найден (${res.status})`;
      }
    });

  function playAnimation(index) {
    if (!animations[index]) return;

    mv.animationName = animations[index];
    mv.currentTime = 0;
    mv.play();

    console.log('▶️', animations[index]);
  }

  btn1.onclick = () => playAnimation(0);
  btn2.onclick = () => playAnimation(1);

  // Эффекты
  outlineBtn.onclick = () => {
    outlineOn = !outlineOn;
    outlineEffect.setAttribute('blend-mode', outlineOn ? 'default' : 'skip');
    outlineBtn.classList.toggle('active');
  };

  pixelBtn.onclick = () => {
    pixelOn = !pixelOn;
    pixelEffect.setAttribute('blend-mode', pixelOn ? 'default' : 'skip');
    pixelBtn.classList.toggle('active');
  };

})();
</script>

</body>
</html>
